# ============================================================
# FlexAutoML – Default Configuration
# ============================================================
# Copy this file to create custom run profiles.
# All keys are optional; any missing key falls back to its
# built-in default (defined in utils/config_loader.py).

# ── Problem type ──────────────────────────────────────────
# 'auto'           → infer from the target column
# 'classification' → force classification mode
# 'regression'     → force regression mode
problem_type: auto

# Name of the column to predict (null = select in the UI)
target_column: null

# ── Preprocessing ─────────────────────────────────────────
preprocessing:

  # Scaler applied to numerical features
  #   'standard'  → zero mean, unit variance (StandardScaler)
  #   'minmax'    → scale to [0, 1] (MinMaxScaler)
  #   null        → no scaling
  scaler: standard

  # Strategy for imputing numerical missing values
  #   'median' | 'mean' | 'most_frequent'
  num_impute_strategy: median

  # Strategy for imputing categorical missing values
  #   'most_frequent' | 'constant'
  cat_impute_strategy: most_frequent

  # Append a SelectKBest feature-selection step
  use_feature_selection: false

  # Number of top features to keep (active when use_feature_selection=true)
  k_best_features: 10

# ── Training ──────────────────────────────────────────────
training:

  # Subset of models to train.  Set to null to use ALL available models
  # for the detected problem type.  Example (uncomment to use):
  # selected_models:
  #   - RandomForestClassifier
  #   - XGBClassifier
  #   - LGBMClassifier
  selected_models: null

  # Primary optimisation & ranking metric
  #   Classification : accuracy | f1 | roc_auc | precision | recall
  #   Regression     : rmse | mae | r2
  metric: accuracy

  # Number of Optuna trials to run per model
  n_trials: 30

  # Cross-validation folds used during hyperparameter search
  cv_folds: 5

  # Fraction of data reserved as the held-out test set
  test_size: 0.20

  # Global random seed for reproducibility
  random_state: 42

# ── GPU ───────────────────────────────────────────────────
gpu:
  # 'auto' → detect GPU at runtime (nvidia-smi / torch.cuda)
  # true   → force GPU (XGBoost device=cuda, LightGBM device=gpu)
  # false  → force CPU
  use_gpu: auto

# ── Output ────────────────────────────────────────────────
output:
  # Directory where trained model .pkl files are written
  save_dir: models

  # CSV path for the model leaderboard
  leaderboard_path: leaderboard.csv
